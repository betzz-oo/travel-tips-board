<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Tips Sharing Board</title>

    <!-- Firebase SDK Start -->
    <!-- Modular SDK is handled via imports in script.js -->
    <!-- Firebase SDK End -->

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Travel Stickers -->
    <div class="sticker s1" style="--rot: -15deg;"><img src="sticker_1.png" style="width: 100px; height: auto;"
            alt="Aesthetic Polaroid Beach"></div>
    <div class="sticker s2" style="--rot: 20deg;"><img src="sticker_2.png" style="width: 90px; height: auto;"
            alt="Vintage Luggage Tag"></div>
    <div class="sticker s3" style="--rot: -10deg;"><img src="sticker_3.png" style="width: 110px; height: auto;"
            alt="Retro Compass"></div>
    <div class="sticker s4" style="--rot: 12deg;"><img src="sticker_4.png" style="width: 100px; height: auto;"
            alt="Passport Stamps"></div>
    <div class="sticker s5" style="--rot: -25deg;"><img src="sticker_5.png" style="width: 95px; height: auto;"
            alt="Travel Journal"></div>
    <div class="sticker s6" style="--rot: 18deg;"><img
            src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=150&h=150&fit=crop"
            style="width: 100px; height: 100px; border-radius: 12px; object-fit: cover;" alt="Aesthetic Camera"></div>

    <div class="container">
        <header>
            <h1>🌍 Travel Tips Sharing Board</h1>
            <p>Share your best travel hacks, foodie spots, and safety tips!</p>
        </header>

        <div class="main-content">
            <!-- Form Section -->
            <section class="form-section">
                <h2>Post a Tip</h2>
                <form id="tipForm">
                    <div class="form-group">
                        <label for="location">Location (Required) 📍</label>
                        <input type="text" id="location" placeholder="e.g., Kyoto, Japan or Global" required>
                    </div>

                    <div class="form-group">
                        <label for="category">Category 🏷️</label>
                        <input type="text" id="category" placeholder="e.g., Food, Safety, Budget..." required>
                    </div>

                    <div class="form-group">
                        <label for="tipContent">Your Tip 💡</label>
                        <textarea id="tipContent" placeholder="Share your experience..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="authorName">Name 👤</label>
                        <input type="text" id="authorName" placeholder="Your Name" required>
                    </div>

                    <div class="form-group">
                        <label for="authorEmail">Email 📧</label>
                        <input type="email" id="authorEmail" placeholder="your@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="proofOfVisit">Proof of Visit (Photo URL or Link) 📸</label>
                        <input type="url" id="proofOfVisit" placeholder="https://example.com/my-photo.jpg">
                    </div>

                    <button type="submit" id="submitBtn">Share Tip</button>
                </form>
            </section>

            <!-- Display Section -->
            <section>
                <div class="filter-section">
                    <label for="filterCategory"><strong>Filter by:</strong></label>
                    <select id="filterCategory">
                        <option value="All">All Categories</option>
                        <option value="Food">Food & Dining</option>
                        <option value="Safety">Safety</option>
                        <option value="Budget">Budget</option>
                        <option value="Places">Must-Visit Places</option>
                        <option value="Hotels">Hotels & Stays</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="tips-section" id="tipsContainer">
                    <div class="loading">Loading tips...</div>
                    <!-- Tips will be injected here via JavaScript -->
                </div>
            </section>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
